name: dbt_pipeline
version: 1.0.0
config-version: 2

profile: dbt_pipeline

model-paths: ["models"]
test-paths: ["tests"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Persist all data-test failures/warns to the dbt_test__audit schema so the
# review rows surfaced by assert_no_review_records are inspectable later.
data_tests:
  +store_failures: true

# One dbt layer -> one physical schema -> one tag, using the same vocabulary
# (staging / intermediate / marts).
# dbt run --select tag:staging   <->   schema main_staging (dbt prepends main_ to the schema name)
models:
  dbt_pipeline:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
      +tags: [staging]
    intermediate:
      +materialized: table
      +schema: intermediate
      +tags: [intermediate]
    marts:
      +materialized: table
      +schema: marts
      +tags: [marts]