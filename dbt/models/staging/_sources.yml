version: 2

sources:
  - name: raw
    description: >
      Raw landing layer loaded verbatim from the source CSVs by
      scripts/load_raw.py. Every column is VARCHAR by design: this is a
      faithful, untyped copy of the source files. Type coercion, cleaning, and
      validation happen downstream in the staging layer. Source tests
      (unique, not_null, accepted_values, relationships plus the custom
      generic tests hours_in_range, date_parseable, invalid_budget,
      unique_natural_key defined in tests/generic/) guard data quality at the
      landing boundary; failing rows are persisted by store_failures to the
      main_dbt_test__audit schema.
    schema: main_raw
    tables:
      - name: projects
        description: "Raw projects source (project_id, project_name, budget), all VARCHAR."
        columns:
          - name: project_id
            description: "Raw project identifier (VARCHAR)."
            data_tests:
              - unique
              - not_null
          - name: project_name
            description: "Raw project name (VARCHAR)."
            data_tests:
              - not_null:
                  config:
                    severity: warn
          - name: budget
            description: "Raw project budget (VARCHAR); may be non-numeric, negative, or empty."
            data_tests:
              - invalid_budget:
                  config:
                    severity: warn
      - name: employees
        description: "Raw employees source (employee_id, name, role), all VARCHAR."
        columns:
          - name: employee_id
            description: "Raw employee identifier (VARCHAR)."
            data_tests:
              - unique
              - not_null
          - name: name
            description: "Raw employee name (VARCHAR)."
            data_tests:
              - not_null:
                  config:
                    severity: warn
          - name: role
            description: "Raw employee role (VARCHAR); one of a fixed set of valid roles."
            data_tests:
              - not_null:
                  config:
                    severity: warn
              - accepted_values:
                  arguments:
                    values:
                      - Data Engineer
                      - Data Analyst
                      - Backend Engineer
                      - Data Scientist
                      - Product Manager
                      - Analytics Engineer
                      - DevOps Engineer
                      - Project Manager
      - name: timesheets
        description: "Raw timesheets source (employee_id, project_id, date, hours), all VARCHAR."
        data_tests:
          - unique_natural_key:
              arguments:
                columns: [employee_id, project_id, date]
        columns:
          - name: employee_id
            description: "Raw employee foreign key (VARCHAR)."
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'employees')
                    field: employee_id
          - name: project_id
            description: "Raw project foreign key (VARCHAR)."
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'projects')
                    field: project_id
          - name: date
            description: "Raw timesheet date (VARCHAR); mixed source formats (ISO yyyy-mm-dd, dd/mm/yyyy, dd-Mon-yy)."
            data_tests:
              - date_parseable
          - name: hours
            description: "Raw hours worked (VARCHAR)."
            data_tests:
              - hours_in_range