version: 2

# Staging = typed projections of the raw sources plus source-level cleaning
# (dedup of exact duplicates; single-source hard rejects removed in
# stg_timesheets). Per dbt-Labs guidance, staging "should clean up or mitigate
# data issues that can't be fixed at the source" -- duplicate rows and
# single-source hard rejects are exactly that, so they are filtered here. No
# tests on staging models themselves: detection happens at the source layer
# (source tests in _sources.yml) and the consumer-facing marts carry their own
# grain tests. Rows with a valid key but a missing or suspect attribute are
# intentionally retained and surfaced by warn-severity source tests.

models:
  - name: stg_projects
    description: "Typed, deduplicated projection of raw.projects. One row per non-null project_id (dedup survivor by dup_rank = 1). Budget is cast to decimal; non-numeric values become NULL. Rows with a valid id but a missing or invalid attribute are retained."
    columns:
      - name: project_id
        description: "Project identifier; non-null, exact duplicates removed."
      - name: project_name
        description: "Project name; nullable."
      - name: budget
        description: "Project budget as decimal(12,2); nullable (non-numeric source values become NULL)."

  - name: stg_employees
    description: "Typed, deduplicated projection of raw.employees. One row per non-null employee_id (dedup survivor). Rows with a valid id but a missing name or role are retained."
    columns:
      - name: employee_id
        description: "Employee identifier; non-null, exact duplicates removed."
      - name: name
        description: "Employee name; nullable."
      - name: role
        description: "Employee role; nullable."

  - name: stg_timesheets
    description: "Typed projection of raw.timesheets with single-source validity filtering: rows missing employee_id, with an unparseable date, or with non-numeric or out-of-range hours are removed. Adds a deterministic surrogate primary key. Cross-source referential issues are resolved downstream in int_timesheets_validated."
    columns:
      - name: timesheet_id
        description: "Deterministic surrogate primary key; md5 of the natural key (employee_id, project_id, date, hours)."
      - name: employee_id
        description: "Employee identifier; non-null."
      - name: project_id
        description: "Project identifier; non-null."
      - name: date
        description: "Parsed timesheet date; non-null. Coerced from multiple source formats (ISO, dd/mm/yyyy, dd-Mon-yy)."
      - name: hours
        description: "Hours worked as decimal(5,2); non-null, constrained to the range (0, 24]."