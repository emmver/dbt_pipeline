version: 2

# Marts layer = clean, consumer-facing models with a single grain.
# PK enforced at build time by DuckDB primary_key constraints (idempotent).
# FK enforced by the pipeline (int filter) + relationships tests (detection) —
# a DB foreign_key constraint breaks DuckDB re-runs (dbt-duckdb #425).
# Nullable attribute columns get NO not_null constraint — they rely on
# warn-severity source tests instead, so kept rows with missing attributes do
# not hard-fail the build.

models:
  - name: dim_projects
    description: "Project dimension. One row per project_id, drawn from the deduplicated staging survivors. Contracted; project_id is a database-enforced primary key and the foreign-key target for fct_timesheets."
    config:
      contract:
        enforced: true
    columns:
      - name: project_id
        data_type: varchar
        description: "Project primary key (DB-enforced)."
        constraints:
          - type: primary_key
      - name: project_name
        data_type: varchar
        description: "Project name; nullable."
      - name: budget
        data_type: decimal(12,2)
        description: "Project budget as decimal(12,2); nullable."

  - name: dim_employees
    description: "Employee dimension. One row per employee_id, drawn from the deduplicated staging survivors. Contracted; employee_id is a database-enforced primary key and the foreign-key target for fct_timesheets."
    config:
      contract:
        enforced: true
    columns:
      - name: employee_id
        data_type: varchar
        description: "Employee primary key (DB-enforced)."
        constraints:
          - type: primary_key
      - name: name
        data_type: varchar
        description: "Employee name; nullable."
      - name: role
        data_type: varchar
        description: "Employee role; nullable. One of a fixed set of valid roles."

  - name: fct_timesheets
    description: "Timesheets fact table: the accepted fact set joined to dim_employees and dim_projects with dimension attributes denormalized for query convenience. One row per timesheet_id. Primary key enforced by the database; foreign-key integrity is enforced upstream by int_timesheets_validated and asserted here by relationships tests."
    config:
      contract:
        enforced: true
    columns:
      - name: timesheet_id
        data_type: varchar
        description: "Fact primary key (DB-enforced). Deterministic md5 surrogate of the natural key (employee_id, project_id, date)."
        constraints:
          - type: primary_key
      - name: employee_id
        data_type: varchar
        description: "Employee foreign key → dim_employees.employee_id."
        tests:
          - relationships:
              arguments:
                to: ref('dim_employees')
                field: employee_id
      - name: employee_name
        data_type: varchar
        description: "Denormalized employee name (from dim_employees)."
      - name: employee_role
        data_type: varchar
        description: "Denormalized employee role (from dim_employees)."
      - name: project_id
        data_type: varchar
        description: "Project foreign key → dim_projects.project_id."
        tests:
          - relationships:
              arguments:
                to: ref('dim_projects')
                field: project_id
      - name: project_name
        data_type: varchar
        description: "Denormalized project name (from dim_projects)."
      - name: project_budget
        data_type: decimal(12,2)
        description: "Denormalized project budget (from dim_projects); nullable."
      - name: date
        data_type: date
        description: "Timesheet date; non-null. Parsed from multiple source formats."
      - name: hours
        data_type: decimal(5,2)
        description: "Hours worked; non-null, in range (0, 24]."

  - name: agg_hours_per_project
    description: "Per-project rollup of logged hours from the clean fact table. project_id is a database-enforced primary key (the aggregation grain)."
    config:
      contract:
        enforced: true
    columns:
      - name: project_id
        data_type: varchar
        description: "Project primary key (DB-enforced)."
        constraints:
          - type: primary_key
      - name: project_name
        data_type: varchar
        description: "Project name (denormalized from dim_projects)."
      - name: timesheet_count
        data_type: integer
        description: "Number of timesheet entries for this project."
      - name: total_hours
        data_type: decimal(12,2)
        description: "Total logged hours for this project (sum of fct_timesheets.hours)."
        constraints:
          - type: not_null
      - name: distinct_employees
        data_type: integer
        description: "Count of distinct employees who logged hours on this project."

  - name: agg_hours_per_project_monthly
    description: "Monthly per-project rollup of logged hours. Adds a time dimension to the per-project aggregation, exposing each project's burn-down over time. One row per (project_id, month). Reads fct_timesheets."
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [project_id, month]
    columns:
      - name: project_id
        data_type: varchar
        description: "Project identifier; part of the composite primary key (project_id, month)."
        tests:
          - relationships:
              arguments:
                to: ref('dim_projects')
                field: project_id
      - name: project_name
        data_type: varchar
        description: "Project name (denormalized from dim_projects)."
      - name: month
        data_type: date
        description: "First day of the month (date_trunc('month', date)); part of the composite primary key."
      - name: timesheet_count
        data_type: integer
        description: "Number of timesheet entries for this project in this month."
      - name: total_hours
        data_type: decimal(12,2)
        description: "Total logged hours for this project in this month."
      - name: distinct_employees
        data_type: integer
        description: "Count of distinct employees who logged hours on this project in this month."

  - name: rpt_project_economics
    description: "Per-project economics report: budget, logged hours, and a derived budget_per_hour rate. Left-joins from dim_projects so all projects appear (budgeted-but-not-started projects show zero hours). budget_per_hour is meaningful only when the budget represents a labor-cost budget."
    config:
      contract:
        enforced: true
    constraints:
      - type: primary_key
        columns: [project_id]
    columns:
      - name: project_id
        data_type: varchar
        description: "Project primary key (DB-enforced)."
      - name: project_name
        data_type: varchar
        description: "Project name (from dim_projects)."
      - name: budget
        data_type: decimal(12,2)
        description: "Project budget (from dim_projects); nullable."
      - name: total_hours
        data_type: decimal(12,2)
        description: "Total logged hours for this project (zero for budgeted-but-not-started projects)."
      - name: distinct_employees
        data_type: integer
        description: "Count of distinct employees who logged hours (zero for projects with no timesheets)."
      - name: budget_per_hour
        data_type: decimal(18,4)
        description: "Derived: budget / total_hours. NULL when total_hours is zero or budget is null."